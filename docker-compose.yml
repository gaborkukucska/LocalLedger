services:
  localedger:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - DB_ENCRYPTION_KEY=supersecret_localedger_key_32b_
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
